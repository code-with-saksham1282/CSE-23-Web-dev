<!DOCTYPE html>
<html>
<head>
    <title>Even or Odd Checker</title>
</head>

<style>
    body {
    font-family: Arial, sans-serif;
    background-color: #070d66;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background-color: rgb(223, 72, 250);
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    text-align: center;
    width: 300px;
}

h2 {
    color: #333;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    font-size: 16px;
}

button {
    padding: 10px 20px;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background-color: #0056b3;
}

#result {
    margin-top: 15px;
    font-size: 20px;
    font-weight: bold;
}
</style>
<body>
    <div class="container">
        <h2>Check Even or Odd number</h2>

    <input type="number" id="num" placeholder="Enter a number">
    <button onclick="checkNumber()">Check</button>

    <p id="result"></p>

    <script>
        function checkNumber() {
            let number = document.getElementById("num").value;

            if (number % 2 == 0) {
                document.getElementById("result").innerHTML =
                    number + " is an Even Number";
            } else {
                document.getElementById("result").innerHTML =
                    number + " is an Odd Number";
            }
        }
    </script>

</div>
</body>
</html>
